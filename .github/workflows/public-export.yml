name: ccl-public-export

on:
  push:
    branches:
      - main
      - "chore/**"
      - "feat/**"
      - "fix/**"
  pull_request:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run export pipeline checks
        run: |
          python scripts/export_public.py
          python scripts/validate_public_release.py
